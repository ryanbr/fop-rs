name: Manual Publish
on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
jobs:
  build-linux-windows:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 gcc-mingw-w64-i686 gcc-multilib
          rustup target add x86_64-pc-windows-gnu
          rustup target add i686-pc-windows-gnu
          rustup target add i686-unknown-linux-gnu
        
      - name: Install zigbuild for ARM builds
        run: |
          sudo snap install zig --classic --beta
          cargo install cargo-zigbuild

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
                   
      - name: Bump version and sync install.js
        id: version
        run: |
          npm version ${{ inputs.bump }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          sed -i "s/const VERSION = '.*'/const VERSION = '$NEW_VERSION'/" install.js
          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" Cargo.toml
          cargo check  # Updates Cargo.lock
          git add package.json install.js Cargo.toml Cargo.lock
          git commit -m "v$NEW_VERSION"
          git tag "v$NEW_VERSION"
          
      - name: Install llvm-tools for PGO
        run: rustup component add llvm-tools-preview

      - name: Generate PGO profile data
        run: |
          RUSTFLAGS="-Cprofile-generate=/tmp/pgo-data" cargo build --release
          cargo test --release || true
          $(rustc --print sysroot)/lib/rustlib/x86_64-unknown-linux-gnu/bin/llvm-profdata merge -o /tmp/pgo-data/merged.profdata /tmp/pgo-data
          cargo clean

      - name: Build binaries
        run: |
          VERSION=${{ steps.version.outputs.version }}
          # Baseline - works on all x86_64 (no PGO)
          cargo build --release
          cp target/release/fop "fop-${VERSION}-linux-x86_64"

          # Optimized for ~2015+ CPUs (AVX2) + PGO
          cargo clean
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS="-C target-cpu=x86-64-v3 -Cprofile-use=/tmp/pgo-data/merged.profdata" cargo build --release --target x86_64-unknown-linux-gnu
          cp target/x86_64-unknown-linux-gnu/release/fop "fop-${VERSION}-linux-x86_64-v3"


          # Linux x86 32-bit
          cargo clean
          cargo build --release --target i686-unknown-linux-gnu
          cp target/i686-unknown-linux-gnu/release/fop "fop-${VERSION}-linux-x86_32"

          # Windows x86_64 baseline
          cargo clean
          cargo build --release --target x86_64-pc-windows-gnu
          cp target/x86_64-pc-windows-gnu/release/fop.exe "fop-${VERSION}-windows-x86_64.exe"

          # Windows x86_64-v3 (optimized for ~2015+ CPUs)
          cargo clean
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_RUSTFLAGS="-C target-cpu=x86-64-v3" cargo build --release --target x86_64-pc-windows-gnu
          cp target/x86_64-pc-windows-gnu/release/fop.exe "fop-${VERSION}-windows-x86_64-v3.exe"

          # Linux x86_64-v4 (AVX-512: Intel Ice Lake+, AMD Zen 4+) + PGO
          cargo clean
          rustup target add x86_64-unknown-linux-gnu
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS="-C target-cpu=x86-64-v4 -Cprofile-use=/tmp/pgo-data/merged.profdata" cargo build --release --target x86_64-unknown-linux-gnu
          cp target/x86_64-unknown-linux-gnu/release/fop "fop-${VERSION}-linux-x86_64-v4"

          # Windows x86_64-v4 (AVX-512: Intel Ice Lake+, AMD Zen 4+)
          cargo clean
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_RUSTFLAGS="-C target-cpu=x86-64-v4" cargo build --release --target x86_64-pc-windows-gnu
          cp target/x86_64-pc-windows-gnu/release/fop.exe "fop-${VERSION}-windows-x86_64-v4.exe"

          # Windows x86 32-bit
          cargo clean
          cargo build --release --target i686-pc-windows-gnu
          cp target/i686-pc-windows-gnu/release/fop.exe "fop-${VERSION}-windows-x86_32.exe"


          # Linux ARM64 baseline (Raspberry Pi 3/4/5, Orange Pi, all ARM64)
          cargo clean
          rustup target add aarch64-unknown-linux-gnu
          cargo zigbuild --release --target aarch64-unknown-linux-gnu
          cp target/aarch64-unknown-linux-gnu/release/fop "fop-${VERSION}-linux-arm64"

          # Linux ARM64 optimized (Neoverse N1+: Graviton2+, Ampere, Pi 5, Orange Pi 5)
          cargo clean
          RUSTFLAGS="-C target-cpu=neoverse-n1" cargo zigbuild --release --target aarch64-unknown-linux-gnu
          cp target/aarch64-unknown-linux-gnu/release/fop "fop-${VERSION}-linux-arm64-n1"

          # Linux RISC-V 64-bit
          cargo clean
          rustup target add riscv64gc-unknown-linux-gnu
          cargo zigbuild --release --target riscv64gc-unknown-linux-gnu
          cp target/riscv64gc-unknown-linux-gnu/release/fop "fop-${VERSION}-linux-riscv64"

      - name: Upload Linux/Windows artifacts
        uses: actions/upload-artifact@v4.6
        with:
          name: linux-windows-binaries
          path: |
            fop-*-linux-*
            fop-*-windows-*.exe

      - name: Push changes
        run: git push --follow-tags

  build-windows-arm:
    runs-on: windows-latest
    needs: build-linux-windows
    steps:
      - uses: actions/checkout@v5
      
      - name: Pull latest changes
        run: git pull origin main --tags

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - name: Build Windows ARM64
        run: |
          $VERSION = "${{ needs.build-linux-windows.outputs.version }}"
          # Optimized for Snapdragon 8cx Gen 3+ / Cortex-A78+, static CRT to avoid VCRUNTIME140.dll
          $env:RUSTFLAGS="-C target-cpu=cortex-a78 -C target-feature=+crt-static"
          cargo build --release --target aarch64-pc-windows-msvc
          Copy-Item "target\aarch64-pc-windows-msvc\release\fop.exe" "fop-${VERSION}-windows-arm64-v2.exe"

      - name: Upload Windows ARM artifact
        uses: actions/upload-artifact@v4.6
        with:
          name: windows-arm-binaries
          path: fop-*-windows-arm64-v2.exe
         
  build-macos:
    runs-on: macos-latest
    needs: build-linux-windows
    steps:
      - uses: actions/checkout@v5
      
      - name: Pull latest changes
        run: git pull origin main --tags

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install llvm-tools for PGO
        run: rustup component add llvm-tools-preview

      - name: Generate PGO profile data
        run: |
          RUSTFLAGS="-Cprofile-generate=/tmp/pgo-data" cargo build --release
          cargo test --release || true
          $(rustc --print sysroot)/lib/rustlib/aarch64-apple-darwin/bin/llvm-profdata merge -o /tmp/pgo-data/merged.profdata /tmp/pgo-data
          cargo clean

      - name: Build macOS binaries
        run: |
          VERSION=${{ needs.build-linux-windows.outputs.version }}

          # macOS x86_64 (Intel) - no PGO (cross-compiled from ARM runner)
          cargo build --release --target x86_64-apple-darwin
          cp target/x86_64-apple-darwin/release/fop "fop-${VERSION}-macos-x86_64"

          # macOS ARM64 (Apple Silicon - optimized for M1+) + PGO
          cargo clean
          RUSTFLAGS="-C target-cpu=apple-m1 -Cprofile-use=/tmp/pgo-data/merged.profdata" cargo build --release --target aarch64-apple-darwin
          cp target/aarch64-apple-darwin/release/fop "fop-${VERSION}-macos-arm64"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4.6
        with:
          name: macos-binaries
          path: fop-*-macos-*

  release:
    runs-on: ubuntu-latest
    needs: [build-linux-windows, build-windows-arm, build-macos]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
    
      - name: Pull latest changes
        run: |
          git pull origin main --tags

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Download all artifacts
        uses: actions/download-artifact@v4.3

      - name: Create GitHub Release

        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-linux-windows.outputs.version }}
          files: |
            linux-windows-binaries/*
            macos-binaries/*
            windows-arm-binaries/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
